// ── Helpers ───────────────────────────────────────────────────────────────────
function compressImage(dataUrl) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const MAX_W = 120, MAX_H = 180;
      let { width: w, height: h } = img;
      const ratio = Math.min(MAX_W / w, MAX_H / h, 1);
      w = Math.round(w * ratio); h = Math.round(h * ratio);
      const canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL("image/jpeg", 0.75));
    };
    img.onerror = () => resolve(dataUrl);
    img.src = dataUrl;
  });
}

async function lookupISBN(isbn) {
  try {
    const res = await fetch(`https://openlibrary.org/api/books?bibkeys=ISBN:${isbn}&format=json&jscmd=data`);
    const data = await res.json();
    const book = data[`ISBN:${isbn}`];
    if (!book) return null;
    return {
      title: book.title || "",
      author: book.authors?.[0]?.name || "",
      year: book.publish_date ? book.publish_date.match(/\d{4}/)?.[0] || "" : "",
      genre: book.subjects?.[0]?.name || "",
      cover: book.cover?.medium || null,
    };
  } catch { return null; }
}

async function identifyWithClaude(base64, mimeType, apiKey) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json", "x-api-key": apiKey, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
    body: JSON.stringify({
      model: "claude-sonnet-4-6", max_tokens: 1000,
      messages: [{ role: "user", content: [
        { type: "image", source: { type: "base64", media_type: mimeType, data: base64 } },
        { type: "text", text: `Identify any books visible in this image. For each extract title, author, year, genre.\nRespond ONLY with a JSON array, no markdown:\n[{"title":"...","author":"...","year":"...","genre":"..."}]\nIf no books found, return [].` }
      ]}]
    }),
  });
  if (res.status === 401) throw new Error("invalid_key");
  const data = await res.json();
  const text = data.content?.map(c => c.text || "").join("") || "";
  try { return JSON.parse(text.replace(/```json|```/g, "").trim()); } catch { return []; }
}

// ── Barcode Scanner Modal ─────────────────────────────────────────────────────
function ScannerModal({ onResult, onClose }) {
  const mountRef = useRef();
  const [err, setErr] = useState("");
  const [found, setFound] = useState(false);
  const [showManual, setShowManual] = useState(false);
  const [manualIsbn, setManualIsbn] = useState("");
  const foundRef = useRef(false);

  useEffect(() => {
    Quagga.init({
      inputStream: {
        name: "Live",
        type: "LiveStream",
        target: mountRef.current,
        constraints: {
          facingMode: "environment",
          width: { min: 640, ideal: 1280 },
          height: { min: 480, ideal: 720 },
        },
        area: { top: "20%", right: "5%", left: "5%", bottom: "20%" },
      },
      locator: { patchSize: "medium", halfSample: false },
      numOfWorkers: 2,
      frequency: 15,
      decoder: {
        readers: ["ean_reader", "ean_8_reader", "upc_reader", "upc_e_reader", "code_128_reader"],
        multiple: false,
      },
      locate: true,
    }, (err) => {
      if (err) { setErr("Camera access denied. Use manual entry below."); return; }
      Quagga.start();
    });

    Quagga.onDetected((data) => {
      if (foundRef.current) return;
      const code = data.result.codeResult.code;
      // Filter out low-confidence results
      const errors = data.result.codeResult.decodedCodes
        .filter(x => x.error !== undefined)
        .map(x => x.error);
      const avgErr = errors.reduce((a, b) => a + b, 0) / (errors.length || 1);
      if (avgErr > 0.25) return;
      foundRef.current = true;
      setFound(true);
      Quagga.stop();
      setTimeout(() => onResult(code), 400);
    });

    return () => { try { Quagga.stop(); } catch {} };
  }, []);

  function submitManual() {
    const isbn = manualIsbn.replace(/[^0-9Xx]/g, "").toUpperCase();
    if (isbn.length === 10 || isbn.length === 13) {
      Quagga.stop();
      onResult(isbn);
    } else {
      setErr("Please enter a valid 10 or 13 digit ISBN.");
    }
  }

  return (
    <div style={{ position: "fixed", inset: 0, background: "#000", zIndex: 200, display: "flex", flexDirection: "column" }}>
      <div style={{ padding: "16px 20px", display: "flex", justifyContent: "space-between", alignItems: "center", flexShrink: 0 }}>
        <div style={{ color: "#fff", fontSize: 16, fontWeight: 600 }}>Scan barcode</div>
        <button onClick={() => { try { Quagga.stop(); } catch {} onClose(); }} style={{ background: "none", border: "none", color: "#fff", fontSize: 28, cursor: "pointer", lineHeight: 1 }}>×</button>
      </div>

      {/* Quagga mounts video here */}
      <div ref={mountRef} style={{ flex: 1, position: "relative", overflow: "hidden" }} />

      {/* Viewfinder overlay */}
      <div style={{ position: "absolute", top: "60px", left: 0, right: 0, bottom: "120px", display: "flex", alignItems: "center", justifyContent: "center", pointerEvents: "none" }}>
        <div style={{ width: "80%", maxWidth: 320, height: 110, position: "relative", boxShadow: "0 0 0 2000px #00000066" }}>
          {!found && <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 2, background: "linear-gradient(90deg, transparent, #4AFF80, transparent)", animation: "scanline 2s ease-in-out infinite" }} />}
          {[{t:"-2px",l:"-2px",bt:"borderTop",bl:"borderLeft"},{t:"-2px",r:"-2px",bt:"borderTop",bl:"borderRight"},{b:"-2px",l:"-2px",bt:"borderBottom",bl:"borderLeft"},{b:"-2px",r:"-2px",bt:"borderBottom",bl:"borderRight"}].map((c, i) => (
            <div key={i} style={{ position: "absolute", width: 22, height: 22, ...(c.t ? {top:c.t}:{}), ...(c.b ? {bottom:c.b}:{}), ...(c.l ? {left:c.l}:{}), ...(c.r ? {right:c.r}:{}), [c.bt]: "3px solid #4AFF80", [c.bl]: "3px solid #4AFF80" }} />
          ))}
        </div>
      </div>

      {found && (
        <div style={{ position: "absolute", inset: 0, background: "#00000099", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 12, zIndex: 10 }}>
          <div style={{ fontSize: 48 }}>✅</div>
          <div style={{ color: "#fff", fontSize: 16, fontWeight: 600 }}>Barcode found!</div>
          <div style={{ color: "#9B927E", fontSize: 13 }}>Looking up book…</div>
        </div>
      )}

      <div style={{ padding: "14px 20px 20px", background: "#111", flexShrink: 0 }}>
        {err && <div style={{ color: "#F87171", fontSize: 13, marginBottom: 10, textAlign: "center" }}>{err}</div>}
        {!showManual ? (
          <div style={{ textAlign: "center" }}>
            <div style={{ color: "#6B6358", fontSize: 13, marginBottom: 8 }}>Point at the barcode on the back cover</div>
            <button onClick={() => setShowManual(true)} style={{ background: "none", border: "none", color: "#4AFF80", fontSize: 13, cursor: "pointer", textDecoration: "underline" }}>
              Enter ISBN manually instead
            </button>
          </div>
        ) : (
          <div style={{ display: "flex", gap: 8 }}>
            <input value={manualIsbn} onChange={e => setManualIsbn(e.target.value)} placeholder="ISBN (10 or 13 digits)"
              style={{ flex: 1, border: "1px solid #333", borderRadius: 8, padding: "10px 12px", fontSize: 14, color: "#fff", background: "#222", outline: "none" }}
              onKeyDown={e => e.key === "Enter" && submitManual()} autoFocus />
            <button onClick={submitManual} style={{ background: "#4A7C59", color: "#fff", border: "none", borderRadius: 8, padding: "10px 16px", fontSize: 14, fontWeight: 600, cursor: "pointer" }}>
              Look up
            </button>
          </div>
        )}
      </div>
      <style>{`
        #interactive.quagga-viewport { width: 100%; height: 100%; }
        #interactive.quagga-viewport video { width: 100%; height: 100%; object-fit: cover; }
        #interactive.quagga-viewport canvas { display: none; }
        @keyframes scanline { 0%,100% { top: 10%; opacity: 0.6; } 50% { top: 85%; opacity: 1; } }
      `}</style>
    </div>
  );
}

      <div style={{ background: "#FDFAF6", borderRadius: 14, width: "100%", maxWidth: 480, maxHeight: "90vh", overflowY: "auto", boxShadow: "0 8px 40px #00000030" }}>
        <div style={{ padding: "20px 24px 0", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <h2 style={{ margin: 0, fontSize: 18, color: "#1C1810", fontFamily: "Georgia, serif" }}>{form.id ? "Edit book" : "Add book"}</h2>
          <button onClick={onClose} style={{ background: "none", border: "none", fontSize: 22, cursor: "pointer", color: "#9B927E" }}>×</button>
        </div>
        <div style={{ padding: 24, display: "flex", flexDirection: "column", gap: 14 }}>
          {[["Title","title","Book title"],["Author","author","Author name"],["Year published","year","e.g. 2018"],["Genre","genre","e.g. Fiction, History…"]].map(([label, key, placeholder]) => (
            <div key={key}>
              <label style={{ fontSize: 12, fontWeight: 600, color: "#6B6358", display: "block", marginBottom: 4, textTransform: "uppercase", letterSpacing: "0.04em" }}>{label}</label>
              <input style={inputStyle} value={form[key] || ""} onChange={e => set(key, e.target.value)} placeholder={placeholder} />
            </div>
          ))}
          <div>
            <label style={{ fontSize: 12, fontWeight: 600, color: "#6B6358", display: "block", marginBottom: 4, textTransform: "uppercase", letterSpacing: "0.04em" }}>Status</label>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
              {Object.entries(STATUS_CONFIG).map(([key, cfg]) => (
                <button key={key} onClick={() => set("status", key)} style={{ padding: "6px 14px", borderRadius: 6, border: `1.5px solid ${form.status === key ? cfg.color : "#D8D0C4"}`, background: form.status === key ? cfg.bg : "#fff", color: form.status === key ? cfg.color : "#6B6358", fontWeight: form.status === key ? 700 : 400, fontSize: 13, cursor: "pointer" }}>
                  {cfg.label}
                </button>
              ))}
            </div>
          </div>
          {form.status === "loaned" && (
            <div>
              <label style={{ fontSize: 12, fontWeight: 600, color: "#6B6358", display: "block", marginBottom: 4, textTransform: "uppercase", letterSpacing: "0.04em" }}>Loaned to</label>
              <input style={inputStyle} value={form.loanedTo || ""} onChange={e => set("loanedTo", e.target.value)} placeholder="Who has it?" />
            </div>
          )}
          <div>
            <label style={{ fontSize: 12, fontWeight: 600, color: "#6B6358", display: "block", marginBottom: 4, textTransform: "uppercase", letterSpacing: "0.04em" }}>Notes</label>
            <textarea style={{ ...inputStyle, resize: "vertical", minHeight: 72 }} value={form.notes || ""} onChange={e => set("notes", e.target.value)} placeholder="Any thoughts, ratings, or reminders…" />
          </div>
          <button onClick={handleSave} disabled={saving} style={{ background: "#2C3E2D", color: "#fff", border: "none", borderRadius: 8, padding: "12px 0", fontSize: 15, fontWeight: 600, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}>
            {saving ? <><Spinner /> Saving…</> : "Save book"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App() {
  const [session, setSession] = useState(null);
  const [authChecked, setAuthChecked] = useState(false);
  const [books, setBooks] = useState([]);
  const [loadingBooks, setLoadingBooks] = useState(false);
  const [editBook, setEditBook] = useState(null);
  const [showScanner, setShowScanner] = useState(false);
  const [showApiModal, setShowApiModal] = useState(false);
  const [apiKey, setApiKey] = useState(() => localStorage.getItem("my-library-api-key") || "");
  const [uploading, setUploading] = useState(false);
  const [filter, setFilter] = useState("all");
  const [search, setSearch] = useState("");
  const [error, setError] = useState("");
  const [toast, setToast] = useState("");
  const fileRef = useRef();

  function showToast(msg) { setToast(msg); setTimeout(() => setToast(""), 3000); }

  // ── Auth ──
  useEffect(() => {
    sb.auth.getSession().then(({ data }) => { setSession(data.session); setAuthChecked(true); });
    const { data: { subscription } } = sb.auth.onAuthStateChange((_e, session) => setSession(session));
    return () => subscription.unsubscribe();
  }, []);

  // ── Load books from Supabase ──
  useEffect(() => {
    if (!session) return;
    setLoadingBooks(true);
    sb.from("books").select("*").order("created_at", { ascending: false })
      .then(({ data, error }) => {
        if (!error) setBooks(data || []);
        setLoadingBooks(false);
      });
  }, [session]);

  // ── CRUD ──
  async function handleSave(form) {
    const extra = form._extraBooks || [];
    const { _extraBooks, ...clean } = form;
    const userId = session.user.id;

    if (clean.id) {
      const { data, error } = await sb.from("books").update({ ...clean, user_id: userId }).eq("id", clean.id).select().single();
      if (!error) { setBooks(b => b.map(x => x.id === clean.id ? data : x)); showToast("Book updated"); }
    } else {
      const toInsert = [clean, ...extra].map(b => ({ ...b, id: undefined, user_id: userId }));
      const { data, error } = await sb.from("books").insert(toInsert).select();
      if (!error) { setBooks(b => [...(data || []), ...b]); showToast(`Added ${data.length} book${data.length > 1 ? "s" : ""}`); }
    }
    setEditBook(null);
  }

  async function handleDelete(id) {
    await sb.from("books").delete().eq("id", id);
    setBooks(b => b.filter(x => x.id !== id));
    showToast("Book removed");
  }

  // ── Barcode scan ──
  async function handleBarcode(isbn) {
    setShowScanner(false);
    setUploading(true);
    setError("");
    showToast("Looking up ISBN…");
    const info = await lookupISBN(isbn);
    if (info) {
      let cover = info.cover;
      if (cover) {
        // Fetch and compress the Open Library cover
        try {
          const res = await fetch(cover);
          const blob = await res.blob();
          const dataUrl = await new Promise(r => { const fr = new FileReader(); fr.onload = () => r(fr.result); fr.readAsDataURL(blob); });
          cover = await compressImage(dataUrl);
        } catch { cover = null; }
      }
      setEditBook({ ...EMPTY_BOOK, ...info, cover });
    } else {
      setError(`No book found for ISBN ${isbn}. Try adding manually.`);
    }
    setUploading(false);
  }

  // ── Photo upload (Claude fallback) ──
  async function handlePhotoUpload(file) {
    if (!file) return;
    if (!apiKey) { setShowApiModal(true); return; }
    setUploading(true);
    setError("");
    try {
      const base64 = await new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res(r.result.split(",")[1]); r.onerror = rej; r.readAsDataURL(file); });
      const fullDataUrl = `data:${file.type};base64,${base64}`;
      const coverDataUrl = await compressImage(fullDataUrl);
      const identified = await identifyWithClaude(base64, file.type, apiKey);
      if (!identified.length) { setError("No books found in the photo. Try the barcode scanner or add manually."); setUploading(false); return; }
      const first = identified[0];
      setEditBook({ ...EMPTY_BOOK, ...first, cover: coverDataUrl, _extraBooks: identified.slice(1).map(b => ({ ...EMPTY_BOOK, ...b, cover: coverDataUrl })) });
    } catch (e) {
      if (e.message === "invalid_key") setError("Invalid API key. Tap 🔑 to update it.");
      else setError("Something went wrong identifying the photo.");
    }
    setUploading(false);
  }

  const filtered = books.filter(b => {
    const matchFilter = filter === "all" || b.status === filter;
    const q = search.toLowerCase();
    return matchFilter && (!q || (b.title||"").toLowerCase().includes(q) || (b.author||"").toLowerCase().includes(q) || (b.genre||"").toLowerCase().includes(q));
  });
  const counts = { all: books.length, unread: 0, reading: 0, read: 0, loaned: 0 };
  books.forEach(b => { if (counts[b.status] !== undefined) counts[b.status]++; });

  if (!authChecked) return (
    <div style={{ minHeight: "100vh", background: "#F7F3EC", display: "flex", alignItems: "center", justifyContent: "center" }}>
      <Spinner size={32} color="#2C3E2D" />
    </div>
  );

  if (!session) return <AuthScreen onAuth={setSession} />;

  return (
    <div style={{ minHeight: "100vh", background: "#F7F3EC" }}>
      {/* Header */}
      <div style={{ background: "#2C3E2D" }}>
        <div style={{ padding: "24px 24px 20px", maxWidth: 640, margin: "0 auto" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
            <div>
              <h1 style={{ margin: "0 0 4px", color: "#F0EAD6", fontFamily: "Georgia, serif", fontSize: 26, letterSpacing: "-0.01em" }}>My Library</h1>
              <p style={{ margin: 0, color: "#8FAB8F", fontSize: 13 }}>
                {loadingBooks ? "Loading…" : books.length === 0 ? "No books yet" : `${books.length} book${books.length === 1 ? "" : "s"} catalogued`}
              </p>
            </div>
            <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
              <button onClick={() => setShowApiModal(true)} title="Anthropic API key" style={{ background: "none", border: "1px solid #4A5E4A", borderRadius: 8, padding: "6px 10px", cursor: "pointer", fontSize: 15, color: apiKey ? "#8FAB8F" : "#E8A87C" }}>{apiKey ? "🔑" : "🔑⚠️"}</button>
              <button onClick={() => sb.auth.signOut()} title="Sign out" style={{ background: "none", border: "1px solid #4A5E4A", borderRadius: 8, padding: "6px 10px", cursor: "pointer", fontSize: 15, color: "#8FAB8F" }}>↪</button>
            </div>
          </div>

          {/* Action buttons */}
          <div style={{ display: "flex", gap: 8, marginTop: 18, flexWrap: "wrap" }}>
            <button onClick={() => setShowScanner(true)} disabled={uploading}
              style={{ background: "#4A7C59", color: "#fff", border: "none", borderRadius: 8, padding: "9px 16px", fontSize: 14, fontWeight: 600, cursor: "pointer", display: "flex", alignItems: "center", gap: 6 }}>
              📷 Scan barcode
            </button>
            <button onClick={() => fileRef.current?.click()} disabled={uploading}
              style={{ background: "transparent", color: "#C8D8C8", border: "1.5px solid #4A5E4A", borderRadius: 8, padding: "9px 16px", fontSize: 14, fontWeight: 600, cursor: uploading ? "default" : "pointer", display: "flex", alignItems: "center", gap: 6 }}>
              {uploading ? <><Spinner color="#8FAB8F" size={14} /> Identifying…</> : "🖼 Shelf photo"}
            </button>
            <button onClick={() => setEditBook({ ...EMPTY_BOOK })}
              style={{ background: "transparent", color: "#C8D8C8", border: "1.5px solid #4A5E4A", borderRadius: 8, padding: "9px 16px", fontSize: 14, fontWeight: 600, cursor: "pointer" }}>
              + Manual
            </button>
          </div>
          <input ref={fileRef} type="file" accept="image/*" style={{ display: "none" }} onChange={e => { handlePhotoUpload(e.target.files[0]); e.target.value = ""; }} />
          {error && <div style={{ marginTop: 12, background: "#5A2A2A", color: "#F8D0D0", borderRadius: 6, padding: "8px 12px", fontSize: 13 }}>{error}</div>}
        </div>
      </div>

      {/* Filter bar */}
      <div style={{ background: "#EDE8DF", borderBottom: "1px solid #D8D0C4" }}>
        <div style={{ maxWidth: 640, margin: "0 auto", padding: "0 24px", display: "flex", overflowX: "auto" }}>
          {[["all","All"],["unread","Unread"],["reading","Reading"],["read","Read"],["loaned","Loaned"]].map(([key, label]) => (
            <button key={key} onClick={() => setFilter(key)} style={{ background: "none", border: "none", borderBottom: filter === key ? "2px solid #2C3E2D" : "2px solid transparent", color: filter === key ? "#2C3E2D" : "#7A7260", fontWeight: filter === key ? 700 : 400, fontSize: 13, padding: "12px 14px", cursor: "pointer", whiteSpace: "nowrap" }}>
              {label}
              {counts[key] > 0 && <span style={{ marginLeft: 5, background: filter === key ? "#2C3E2D" : "#C4BEB4", color: "#fff", borderRadius: 10, fontSize: 10, padding: "1px 6px", fontWeight: 700 }}>{counts[key]}</span>}
            </button>
          ))}
        </div>
      </div>

      {/* Book list */}
      <div style={{ maxWidth: 640, margin: "0 auto", padding: "20px 24px 60px" }}>
        {books.length > 0 && (
          <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search by title, author, or genre…"
            style={{ width: "100%", border: "1px solid #D8D0C4", borderRadius: 8, padding: "9px 14px", fontSize: 14, color: "#1C1810", background: "#fff", marginBottom: 16, outline: "none" }} />
        )}
        {loadingBooks ? (
          <div style={{ textAlign: "center", padding: "60px 0" }}><Spinner size={28} color="#9B927E" /></div>
        ) : filtered.length === 0 ? (
          <div style={{ textAlign: "center", padding: "60px 0", color: "#9B927E" }}>
            {books.length === 0
              ? <><div style={{ fontSize: 48, marginBottom: 12 }}>📚</div><div style={{ fontSize: 16, fontWeight: 600, color: "#6B6358", marginBottom: 6 }}>Your shelves are empty</div><div style={{ fontSize: 14 }}>Scan a barcode or upload a photo to get started.</div></>
              : <><div style={{ fontSize: 32, marginBottom: 8 }}>🔍</div><div style={{ fontSize: 14 }}>No books match your search.</div></>}
          </div>
        ) : (
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {filtered.map(book => <BookCard key={book.id} book={book} onEdit={setEditBook} onDelete={handleDelete} />)}
          </div>
        )}
      </div>

      {/* Toast */}
      {toast && (
        <div style={{ position: "fixed", bottom: 24, left: "50%", transform: "translateX(-50%)", background: "#2C3E2D", color: "#fff", borderRadius: 8, padding: "10px 20px", fontSize: 14, fontWeight: 500, boxShadow: "0 4px 20px #00000030", zIndex: 300, whiteSpace: "nowrap", animation: "fadeIn 0.2s ease" }}>
          {toast}
        </div>
      )}

      {showScanner && <ScannerModal onResult={handleBarcode} onClose={() => setShowScanner(false)} />}
      {editBook !== null && <EditModal book={editBook} onSave={handleSave} onClose={() => setEditBook(null)} />}
      {showApiModal && <ApiKeyModal current={apiKey} onSave={k => { localStorage.setItem("my-library-api-key", k); setApiKey(k); setShowApiModal(false); showToast("API key saved"); }} onClose={() => setShowApiModal(false)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
