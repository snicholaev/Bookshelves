// ── Image compression ──────────────────────────────────────────────────────────
function compressImage(dataUrl) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const MAX_W = 120, MAX_H = 180;
      let { width: w, height: h } = img;
      const ratio = Math.min(MAX_W / w, MAX_H / h, 1);
      w = Math.round(w * ratio); h = Math.round(h * ratio);
      const canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL("image/jpeg", 0.75));
    };
    img.onerror = () => resolve(dataUrl);
    img.src = dataUrl;
  });
}

// ── Open Library ISBN lookup ───────────────────────────────────────────────────
async function lookupISBN(isbn) {
  try {
    const res = await fetch(`https://openlibrary.org/api/books?bibkeys=ISBN:${isbn}&format=json&jscmd=data`);
    const data = await res.json();
    const book = data[`ISBN:${isbn}`];
    if (!book) return null;
    return {
      title: book.title || "",
      author: book.authors?.[0]?.name || "",
      year: book.publish_date ? book.publish_date.match(/\d{4}/)?.[0] || "" : "",
      genre: book.subjects?.[0]?.name || "",
      cover: book.cover?.medium || null,
    };
  } catch { return null; }
}

// ── Barcode Scanner ───────────────────────────────────────────────────────────
function ScannerModal({ onResult, onClose }) {
  const videoRef = useRef();
  const streamRef = useRef();
  const rafRef = useRef();
  const detectorRef = useRef();
  const foundRef = useRef(false);
  const [status, setStatus] = useState("starting"); // starting | scanning | notSupported | error
  const [found, setFound] = useState(false);
  const [showManual, setShowManual] = useState(false);
  const [manualIsbn, setManualIsbn] = useState("");
  const [manualErr, setManualErr] = useState("");

  useEffect(() => {
    async function start() {
      // Use native BarcodeDetector if available (Chrome Android, Safari iOS 17+)
      if ("BarcodeDetector" in window) {
        try {
          detectorRef.current = new BarcodeDetector({
            formats: ["ean_13", "ean_8", "upc_a", "upc_e", "code_128"],
          });
        } catch {
          detectorRef.current = new BarcodeDetector();
        }
      } else {
        setStatus("notSupported");
        setShowManual(true);
        return;
      }

      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: "environment" }, width: { ideal: 1280 }, height: { ideal: 720 } }
        });
        streamRef.current = stream;
        videoRef.current.srcObject = stream;
        await videoRef.current.play();
        setStatus("scanning");
        scanFrame();
      } catch {
        setStatus("error");
        setShowManual(true);
      }
    }

    function scanFrame() {
      if (foundRef.current) return;
      const video = videoRef.current;
      if (!video || video.readyState < 2) { rafRef.current = requestAnimationFrame(scanFrame); return; }

      detectorRef.current.detect(video).then(codes => {
        if (foundRef.current) return;
        if (codes.length > 0) {
          foundRef.current = true;
          const code = codes[0].rawValue;
          setFound(true);
          stopCamera();
          setTimeout(() => onResult(code), 500);
        } else {
          rafRef.current = requestAnimationFrame(scanFrame);
        }
      }).catch(() => { rafRef.current = requestAnimationFrame(scanFrame); });
    }

    start();
    return () => stopCamera();
  }, []);

  function stopCamera() {
    cancelAnimationFrame(rafRef.current);
    streamRef.current?.getTracks().forEach(t => t.stop());
  }

  function handleClose() { stopCamera(); onClose(); }

  function submitManual() {
    const isbn = manualIsbn.replace(/[^0-9Xx]/g, "").toUpperCase();
    if (isbn.length === 10 || isbn.length === 13) {
      stopCamera();
      onResult(isbn);
    } else {
      setManualErr("Please enter a valid 10 or 13 digit ISBN.");
    }
  }

  return (
    <div style={{ position: "fixed", inset: 0, background: "#000", zIndex: 200, display: "flex", flexDirection: "column" }}>
      <div style={{ padding: "16px 20px", display: "flex", justifyContent: "space-between", alignItems: "center", flexShrink: 0 }}>
        <div style={{ color: "#fff", fontSize: 16, fontWeight: 600 }}>Scan barcode</div>
        <button onClick={handleClose} style={{ background: "none", border: "none", color: "#fff", fontSize: 28, cursor: "pointer", lineHeight: 1 }}>×</button>
      </div>

      <div style={{ flex: 1, position: "relative", overflow: "hidden", display: "flex", alignItems: "center", justifyContent: "center" }}>
        <video ref={videoRef} playsInline muted style={{ width: "100%", height: "100%", objectFit: "cover", display: status === "scanning" || status === "starting" ? "block" : "none" }} />

        {status === "starting" && (
          <div style={{ position: "absolute", display: "flex", flexDirection: "column", alignItems: "center", gap: 12 }}>
            <Spinner size={32} color="#4AFF80" />
            <div style={{ color: "#9B927E", fontSize: 14 }}>Starting camera…</div>
          </div>
        )}

        {status === "notSupported" && (
          <div style={{ color: "#9B927E", fontSize: 14, textAlign: "center", padding: "0 32px" }}>
            <div style={{ fontSize: 36, marginBottom: 12 }}>📷</div>
            Barcode scanning isn't supported in this browser. Please use the manual ISBN entry below.
          </div>
        )}

        {/* Viewfinder — only show while scanning */}
        {status === "scanning" && !found && (
          <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", pointerEvents: "none" }}>
            <div style={{ width: "78%", maxWidth: 310, height: 115, position: "relative", boxShadow: "0 0 0 2000px #00000066" }}>
              <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 2, background: "linear-gradient(90deg, transparent, #4AFF80, transparent)", animation: "scanline 2s ease-in-out infinite" }} />
              <div style={{ position: "absolute", top: -2, left: -2, width: 22, height: 22, borderTop: "3px solid #4AFF80", borderLeft: "3px solid #4AFF80" }} />
              <div style={{ position: "absolute", top: -2, right: -2, width: 22, height: 22, borderTop: "3px solid #4AFF80", borderRight: "3px solid #4AFF80" }} />
              <div style={{ position: "absolute", bottom: -2, left: -2, width: 22, height: 22, borderBottom: "3px solid #4AFF80", borderLeft: "3px solid #4AFF80" }} />
              <div style={{ position: "absolute", bottom: -2, right: -2, width: 22, height: 22, borderBottom: "3px solid #4AFF80", borderRight: "3px solid #4AFF80" }} />
            </div>
          </div>
        )}

        {found && (
          <div style={{ position: "absolute", inset: 0, background: "#00000099", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 12 }}>
            <div style={{ fontSize: 48 }}>✅</div>
            <div style={{ color: "#fff", fontSize: 16, fontWeight: 600 }}>Barcode found!</div>
            <div style={{ color: "#9B927E", fontSize: 13 }}>Looking up book…</div>
          </div>
        )}
      </div>

      <div style={{ padding: "14px 20px 28px", background: "#111", flexShrink: 0 }}>
        {!showManual ? (
          <div style={{ textAlign: "center" }}>
            <div style={{ color: "#6B6358", fontSize: 13, marginBottom: 8 }}>Point camera at the barcode on the back cover</div>
            <button onClick={() => setShowManual(true)} style={{ background: "none", border: "none", color: "#4AFF80", fontSize: 13, cursor: "pointer", textDecoration: "underline" }}>
              Enter ISBN manually instead
            </button>
          </div>
        ) : (
          <div>
            <div style={{ color: "#6B6358", fontSize: 12, marginBottom: 8 }}>ISBN is the number on the back cover, usually starting with 978</div>
            {manualErr && <div style={{ color: "#F87171", fontSize: 13, marginBottom: 8 }}>{manualErr}</div>}
            <div style={{ display: "flex", gap: 8 }}>
              <input value={manualIsbn} onChange={e => { setManualIsbn(e.target.value); setManualErr(""); }}
                placeholder="e.g. 9780142437247"
                style={{ flex: 1, border: "1px solid #333", borderRadius: 8, padding: "10px 12px", fontSize: 14, color: "#fff", background: "#222", outline: "none" }}
                onKeyDown={e => e.key === "Enter" && submitManual()} autoFocus />
              <button onClick={submitManual}
                style={{ background: "#4A7C59", color: "#fff", border: "none", borderRadius: 8, padding: "10px 16px", fontSize: 14, fontWeight: 600, cursor: "pointer" }}>
                Look up
              </button>
            </div>
            {status === "scanning" && (
              <button onClick={() => setShowManual(false)} style={{ background: "none", border: "none", color: "#6B6358", fontSize: 12, cursor: "pointer", marginTop: 8, textDecoration: "underline" }}>
                Back to camera
              </button>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

            <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
              {Object.entries(STATUS_CONFIG).map(([key, cfg]) => (
                <button key={key} onClick={() => set("status", key)} style={{ padding: "6px 14px", borderRadius: 6, border: `1.5px solid ${form.status === key ? cfg.color : "#D8D0C4"}`, background: form.status === key ? cfg.bg : "#fff", color: form.status === key ? cfg.color : "#6B6358", fontWeight: form.status === key ? 700 : 400, fontSize: 13, cursor: "pointer" }}>
                  {cfg.label}
                </button>
              ))}
            </div>
          </div>
          {form.status === "loaned" && (
            <div>
              <label style={{ fontSize: 12, fontWeight: 600, color: "#6B6358", display: "block", marginBottom: 4, textTransform: "uppercase", letterSpacing: "0.04em" }}>Loaned to</label>
              <input style={inputStyle} value={form.loanedTo || ""} onChange={e => set("loanedTo", e.target.value)} placeholder="Who has it?" />
            </div>
          )}
          <div>
            <label style={{ fontSize: 12, fontWeight: 600, color: "#6B6358", display: "block", marginBottom: 4, textTransform: "uppercase", letterSpacing: "0.04em" }}>Notes</label>
            <textarea style={{ ...inputStyle, resize: "vertical", minHeight: 72 }} value={form.notes || ""} onChange={e => set("notes", e.target.value)} placeholder="Any thoughts, ratings, or reminders…" />
          </div>
          {err && <div style={{ background: "#FEF0F0", color: "#8B3A3A", borderRadius: 6, padding: "8px 12px", fontSize: 13 }}>{err}</div>}
          <button onClick={handleSave} disabled={saving}
            style={{ background: "#2C3E2D", color: "#fff", border: "none", borderRadius: 8, padding: "12px 0", fontSize: 15, fontWeight: 600, cursor: saving ? "default" : "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}>
            {saving ? <><Spinner /> Saving…</> : "Save book"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App() {
  const [session, setSession] = useState(null);
  const [authChecked, setAuthChecked] = useState(false);
  const [books, setBooks] = useState([]);
  const [loadingBooks, setLoadingBooks] = useState(false);
  const [editBook, setEditBook] = useState(null);
  const [showScanner, setShowScanner] = useState(false);
  const [lookingUp, setLookingUp] = useState(false);
  const [filter, setFilter] = useState("all");
  const [genreFilter, setGenreFilter] = useState("all");
  const [authorFilter, setAuthorFilter] = useState("all");
  const [search, setSearch] = useState("");
  const [showStats, setShowStats] = useState(false);
  const [error, setError] = useState("");
  const [toast, setToast] = useState("");

  function showToast(msg) { setToast(msg); setTimeout(() => setToast(""), 3000); }

  useEffect(() => {
    sb.auth.getSession().then(({ data }) => { setSession(data.session); setAuthChecked(true); });
    const { data: { subscription } } = sb.auth.onAuthStateChange((_e, s) => setSession(s));
    return () => subscription.unsubscribe();
  }, []);

  useEffect(() => {
    if (!session) return;
    setLoadingBooks(true);
    sb.from("books").select("*").order("created_at", { ascending: false })
      .then(({ data, error }) => {
        if (!error) setBooks((data || []).map(fromDb));
        else setError("Failed to load books: " + error.message);
        setLoadingBooks(false);
      });
  }, [session]);

  async function handleSave(form) {
    const userId = session.user.id;
    const dbRow = { ...toDb(form), user_id: userId };
    delete dbRow.id;

    if (form.id) {
      const { data, error } = await sb.from("books").update(toDb(form)).eq("id", form.id).select().single();
      if (error) { showToast("❌ Save failed: " + error.message); return; }
      setBooks(b => b.map(x => x.id === form.id ? fromDb(data) : x));
      showToast("Book updated ✓");
    } else {
      const { data, error } = await sb.from("books").insert([dbRow]).select();
      if (error) { showToast("❌ Save failed: " + error.message); return; }
      setBooks(b => [...(data || []).map(fromDb), ...b]);
      showToast("Book added ✓");
    }
    setEditBook(null);
  }

  async function handleDelete(id) {
    const { error } = await sb.from("books").delete().eq("id", id);
    if (error) { showToast("❌ Delete failed"); return; }
    setBooks(b => b.filter(x => x.id !== id));
    showToast("Book removed");
  }

  async function handleBarcode(isbn) {
    setShowScanner(false);
    setLookingUp(true);
    setError("");
    showToast("Looking up ISBN…");
    const info = await lookupISBN(isbn);
    if (info) {
      let cover = info.cover;
      if (cover) {
        try {
          const res = await fetch(cover);
          const blob = await res.blob();
          const dataUrl = await new Promise(r => { const fr = new FileReader(); fr.onload = () => r(fr.result); fr.readAsDataURL(blob); });
          cover = await compressImage(dataUrl);
        } catch { cover = null; }
      }
      setEditBook({ ...EMPTY_BOOK, ...info, cover });
    } else {
      setError(`No book found for ISBN ${isbn}. You can add it manually.`);
    }
    setLookingUp(false);
  }

  const genres = ["all", ...Array.from(new Set(books.map(b => b.genre).filter(Boolean))).sort()];
  const authors = ["all", ...Array.from(new Set(books.map(b => b.author).filter(Boolean))).sort()];

  const filtered = books.filter(b => {
    const matchStatus = filter === "all" || b.status === filter;
    const matchGenre = genreFilter === "all" || (b.genre||"") === genreFilter;
    const matchAuthor = authorFilter === "all" || (b.author||"") === authorFilter;
    const q = search.toLowerCase();
    const matchSearch = !q || (b.title||"").toLowerCase().includes(q) || (b.author||"").toLowerCase().includes(q) || (b.genre||"").toLowerCase().includes(q);
    return matchStatus && matchGenre && matchAuthor && matchSearch;
  });
  const counts = { all: books.length, unread: 0, reading: 0, read: 0, loaned: 0 };
  books.forEach(b => { if (counts[b.status] !== undefined) counts[b.status]++; });
  const hasActiveFilters = genreFilter !== "all" || authorFilter !== "all" || search !== "";

  const total = books.length || 1;
  const genreCounts = {};
  books.forEach(b => { const g = b.genre || "Unknown"; genreCounts[g] = (genreCounts[g] || 0) + 1; });
  const genreList = Object.entries(genreCounts).sort((a, b) => b[1] - a[1]);

  if (!authChecked) return <div style={{ minHeight: "100vh", background: "#F7F3EC", display: "flex", alignItems: "center", justifyContent: "center" }}><Spinner size={32} color="#2C3E2D" /></div>;
  if (!session) return <AuthScreen />;

  return (
    <div style={{ minHeight: "100vh", background: "#F7F3EC" }}>
      <div style={{ background: "#2C3E2D" }}>
        <div style={{ padding: "24px 24px 20px", maxWidth: 640, margin: "0 auto" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
            <div>
              <h1 style={{ margin: "0 0 4px", color: "#F0EAD6", fontFamily: "Georgia, serif", fontSize: 26, letterSpacing: "-0.01em" }}>My Library</h1>
              <p style={{ margin: 0, color: "#8FAB8F", fontSize: 13 }}>
                {loadingBooks ? "Loading…" : books.length === 0 ? "No books yet" : `${books.length} book${books.length === 1 ? "" : "s"} catalogued`}
              </p>
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              {books.length > 0 && (
                <button onClick={() => setShowStats(s => !s)} title="Stats"
                  style={{ background: showStats ? "#4A7C59" : "none", border: "1px solid #4A5E4A", borderRadius: 8, padding: "6px 10px", cursor: "pointer", fontSize: 15, color: showStats ? "#fff" : "#8FAB8F" }}>📊</button>
              )}
              <button onClick={() => sb.auth.signOut()} title="Sign out"
                style={{ background: "none", border: "1px solid #4A5E4A", borderRadius: 8, padding: "6px 10px", cursor: "pointer", fontSize: 15, color: "#8FAB8F" }}>↪</button>
            </div>
          </div>

          {/* Stats panel */}
          {showStats && books.length > 0 && (
            <div style={{ marginTop: 18, background: "#243327", borderRadius: 12, padding: 16 }}>
              {/* Status breakdown */}
              <div style={{ marginBottom: 14 }}>
                <div style={{ color: "#8FAB8F", fontSize: 11, fontWeight: 700, letterSpacing: "0.06em", textTransform: "uppercase", marginBottom: 10 }}>Reading status</div>
                {[
                  ["Read", counts.read, "#4A9B6F"],
                  ["Reading", counts.reading, "#6BA8D4"],
                  ["Unread", counts.unread, "#C4A882"],
                  ["Loaned out", counts.loaned, "#D47A7A"],
                ].map(([label, count, color]) => count > 0 && (
                  <div key={label} style={{ marginBottom: 7 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}>
                      <span style={{ color: "#C8D8C8", fontSize: 12 }}>{label}</span>
                      <span style={{ color: "#8FAB8F", fontSize: 12 }}>{count} · {Math.round(count / total * 100)}%</span>
                    </div>
                    <div style={{ height: 6, background: "#1A2B1D", borderRadius: 3, overflow: "hidden" }}>
                      <div style={{ height: "100%", width: `${count / total * 100}%`, background: color, borderRadius: 3, transition: "width 0.4s ease" }} />
                    </div>
                  </div>
                ))}
              </div>

              {/* Genre breakdown */}
              {genreList.length > 0 && (
                <div>
                  <div style={{ color: "#8FAB8F", fontSize: 11, fontWeight: 700, letterSpacing: "0.06em", textTransform: "uppercase", marginBottom: 10 }}>By genre</div>
                  {genreList.map(([genre, count]) => (
                    <div key={genre} style={{ marginBottom: 7 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}>
                        <span style={{ color: "#C8D8C8", fontSize: 12 }}>{genre}</span>
                        <span style={{ color: "#8FAB8F", fontSize: 12 }}>{count} · {Math.round(count / total * 100)}%</span>
                      </div>
                      <div style={{ height: 6, background: "#1A2B1D", borderRadius: 3, overflow: "hidden" }}>
                        <div style={{ height: "100%", width: `${count / total * 100}%`, background: "#7A9E8A", borderRadius: 3, transition: "width 0.4s ease" }} />
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}

          <div style={{ display: "flex", gap: 8, marginTop: 18, flexWrap: "wrap" }}>
            <button onClick={() => setShowScanner(true)} disabled={lookingUp}
              style={{ background: "#4A7C59", color: "#fff", border: "none", borderRadius: 8, padding: "9px 16px", fontSize: 14, fontWeight: 600, cursor: "pointer", display: "flex", alignItems: "center", gap: 6 }}>
              {lookingUp ? <><Spinner size={14} /> Looking up…</> : <>📷 Scan barcode</>}
            </button>
            <button onClick={() => setEditBook({ ...EMPTY_BOOK })}
              style={{ background: "transparent", color: "#C8D8C8", border: "1.5px solid #4A5E4A", borderRadius: 8, padding: "9px 16px", fontSize: 14, fontWeight: 600, cursor: "pointer" }}>
              + Add manually
            </button>
          </div>
          {error && <div style={{ marginTop: 12, background: "#5A2A2A", color: "#F8D0D0", borderRadius: 6, padding: "8px 12px", fontSize: 13 }}>{error}</div>}
        </div>
      </div>

      {/* Status filter tabs */}
      <div style={{ background: "#EDE8DF", borderBottom: "1px solid #D8D0C4" }}>
        <div style={{ maxWidth: 640, margin: "0 auto", padding: "0 24px", display: "flex", overflowX: "auto" }}>
          {[["all","All"],["unread","Unread"],["reading","Reading"],["read","Read"],["loaned","Loaned"]].map(([key, label]) => (
            <button key={key} onClick={() => setFilter(key)} style={{ background: "none", border: "none", borderBottom: filter === key ? "2px solid #2C3E2D" : "2px solid transparent", color: filter === key ? "#2C3E2D" : "#7A7260", fontWeight: filter === key ? 700 : 400, fontSize: 13, padding: "12px 14px", cursor: "pointer", whiteSpace: "nowrap" }}>
              {label}
              {counts[key] > 0 && <span style={{ marginLeft: 5, background: filter === key ? "#2C3E2D" : "#C4BEB4", color: "#fff", borderRadius: 10, fontSize: 10, padding: "1px 6px", fontWeight: 700 }}>{counts[key]}</span>}
            </button>
          ))}
        </div>
      </div>

      <div style={{ maxWidth: 640, margin: "0 auto", padding: "16px 24px 60px" }}>

        {/* Search + dropdowns */}
        {books.length > 0 && (
          <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 16 }}>
            <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search by title, author, or genre…"
              style={{ width: "100%", border: "1px solid #D8D0C4", borderRadius: 8, padding: "9px 14px", fontSize: 14, color: "#1C1810", background: "#fff", outline: "none" }} />

            <div style={{ display: "flex", gap: 8 }}>
              {/* Genre dropdown */}
              <div style={{ flex: 1, position: "relative" }}>
                <select value={genreFilter} onChange={e => setGenreFilter(e.target.value)}
                  style={{ width: "100%", appearance: "none", border: `1px solid ${genreFilter !== "all" ? "#2C3E2D" : "#D8D0C4"}`, borderRadius: 8, padding: "8px 32px 8px 12px", fontSize: 13, color: genreFilter !== "all" ? "#2C3E2D" : "#6B6358", background: genreFilter !== "all" ? "#E8F4EE" : "#fff", fontWeight: genreFilter !== "all" ? 600 : 400, cursor: "pointer", outline: "none" }}>
                  <option value="all">All genres</option>
                  {genres.filter(g => g !== "all").map(g => <option key={g} value={g}>{g}</option>)}
                </select>
                <span style={{ position: "absolute", right: 10, top: "50%", transform: "translateY(-50%)", pointerEvents: "none", color: "#9B927E", fontSize: 11 }}>▾</span>
              </div>

              {/* Author dropdown */}
              <div style={{ flex: 1, position: "relative" }}>
                <select value={authorFilter} onChange={e => setAuthorFilter(e.target.value)}
                  style={{ width: "100%", appearance: "none", border: `1px solid ${authorFilter !== "all" ? "#2C3E2D" : "#D8D0C4"}`, borderRadius: 8, padding: "8px 32px 8px 12px", fontSize: 13, color: authorFilter !== "all" ? "#2C3E2D" : "#6B6358", background: authorFilter !== "all" ? "#E8F4EE" : "#fff", fontWeight: authorFilter !== "all" ? 600 : 400, cursor: "pointer", outline: "none" }}>
                  <option value="all">All authors</option>
                  {authors.filter(a => a !== "all").map(a => <option key={a} value={a}>{a}</option>)}
                </select>
                <span style={{ position: "absolute", right: 10, top: "50%", transform: "translateY(-50%)", pointerEvents: "none", color: "#9B927E", fontSize: 11 }}>▾</span>
              </div>
            </div>

            {/* Clear filters */}
            {hasActiveFilters && (
              <button onClick={() => { setSearch(""); setGenreFilter("all"); setAuthorFilter("all"); }}
                style={{ alignSelf: "flex-start", background: "none", border: "none", color: "#8B3A3A", fontSize: 12, cursor: "pointer", textDecoration: "underline", padding: 0 }}>
                Clear filters
              </button>
            )}
          </div>
        )}

        {loadingBooks ? (
          <div style={{ textAlign: "center", padding: "60px 0" }}><Spinner size={28} color="#9B927E" /></div>
        ) : filtered.length === 0 ? (
          <div style={{ textAlign: "center", padding: "60px 0", color: "#9B927E" }}>
            {books.length === 0
              ? <><div style={{ fontSize: 48, marginBottom: 12 }}>📚</div><div style={{ fontSize: 16, fontWeight: 600, color: "#6B6358", marginBottom: 6 }}>Your shelves are empty</div><div style={{ fontSize: 14 }}>Scan a barcode or add a book manually to get started.</div></>
              : <><div style={{ fontSize: 32, marginBottom: 8 }}>🔍</div><div style={{ fontSize: 14 }}>No books match your filters.</div></>}
          </div>
        ) : (
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {filtered.map(book => <BookCard key={book.id} book={book} onEdit={setEditBook} onDelete={handleDelete} />)}
          </div>
        )}
      </div>

      {toast && (
        <div style={{ position: "fixed", bottom: 24, left: "50%", transform: "translateX(-50%)", background: "#2C3E2D", color: "#fff", borderRadius: 8, padding: "10px 20px", fontSize: 14, fontWeight: 500, boxShadow: "0 4px 20px #00000030", zIndex: 300, whiteSpace: "nowrap", animation: "fadeIn 0.2s ease" }}>
          {toast}
        </div>
      )}

      {showScanner && <ScannerModal onResult={handleBarcode} onClose={() => setShowScanner(false)} />}
      {editBook !== null && <EditModal book={editBook} onSave={handleSave} onClose={() => setEditBook(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
