<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="My Library" />
  <meta name="theme-color" content="#2C3E2D" />
  <title>My Library</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
    body { background: #F7F3EC; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useRef, useCallback, useEffect } = React;

    const STORAGE_KEY = "my-library-books";
    const API_KEY_STORAGE = "my-library-api-key";

    const STATUS_CONFIG = {
      unread:  { label: "Unread",     color: "#8B7355", bg: "#F5F0E8" },
      reading: { label: "Reading",    color: "#2C6E49", bg: "#E8F4EE" },
      read:    { label: "Read",       color: "#1A4A7A", bg: "#E8F0F8" },
      loaned:  { label: "Loaned out", color: "#8B3A3A", bg: "#F8EAEA" },
    };

    const EMPTY_BOOK = { id: null, title: "", author: "", year: "", genre: "", status: "unread", loanedTo: "", notes: "", cover: null };

    // localStorage persistence
    function loadBooks() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"); }
      catch { return []; }
    }
    function persistBooks(books) {
      try {
        const slim = books.map(({ cover, ...rest }) => rest);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(slim));
      } catch(e) { console.error("Save failed", e); }
    }
    function loadApiKey() { return localStorage.getItem(API_KEY_STORAGE) || ""; }
    function saveApiKey(k) { localStorage.setItem(API_KEY_STORAGE, k); }

    // --- Status Badge ---
    function StatusBadge({ status }) {
      const cfg = STATUS_CONFIG[status] || STATUS_CONFIG.unread;
      return (
        <span style={{ background: cfg.bg, color: cfg.color, border: `1px solid ${cfg.color}33`, borderRadius: 4, fontSize: 11, fontWeight: 600, letterSpacing: "0.04em", padding: "2px 8px", textTransform: "uppercase", whiteSpace: "nowrap" }}>
          {cfg.label}
        </span>
      );
    }

    // --- API Key Modal ---
    function ApiKeyModal({ onSave, onClose, current }) {
      const [val, setVal] = useState(current || "");
      return (
        <div style={{ position: "fixed", inset: 0, background: "#00000055", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 200, padding: 16 }}
          onClick={e => e.target === e.currentTarget && onClose()}>
          <div style={{ background: "#FDFAF6", borderRadius: 14, width: "100%", maxWidth: 440, padding: 24, boxShadow: "0 8px 40px #00000030" }}>
            <h2 style={{ fontFamily: "Georgia, serif", fontSize: 18, color: "#1C1810", marginBottom: 8 }}>Anthropic API Key</h2>
            <p style={{ fontSize: 13, color: "#6B6358", lineHeight: 1.6, marginBottom: 16 }}>
              To identify books from photos, you need an Anthropic API key. Get one free at{" "}
              <a href="https://console.anthropic.com" target="_blank" rel="noreferrer" style={{ color: "#2C6E49" }}>console.anthropic.com</a>.
              Your key is stored only in this browser and never sent anywhere except Anthropic's API.
            </p>
            <input
              type="password"
              value={val}
              onChange={e => setVal(e.target.value)}
              placeholder="sk-ant-..."
              style={{ width: "100%", border: "1px solid #D8D0C4", borderRadius: 6, padding: "9px 12px", fontSize: 14, color: "#1C1810", background: "#fff", outline: "none", marginBottom: 14 }}
            />
            <div style={{ display: "flex", gap: 10 }}>
              <button onClick={() => { saveApiKey(val); onSave(val); }} style={{ flex: 1, background: "#2C3E2D", color: "#fff", border: "none", borderRadius: 8, padding: "10px 0", fontSize: 14, fontWeight: 600, cursor: "pointer" }}>Save key</button>
              <button onClick={onClose} style={{ background: "none", border: "1px solid #D8D0C4", borderRadius: 8, padding: "10px 16px", fontSize: 14, color: "#6B6358", cursor: "pointer" }}>Cancel</button>
            </div>
          </div>
        </div>
      );
    }

    // --- Book Card ---
    function BookCard({ book, onEdit, onDelete }) {
      return (
        <div style={{ display: "flex", gap: 16, background: "#fff", border: "1px solid #E8E2D8", borderRadius: 10, padding: 16, alignItems: "flex-start" }}>
          <div style={{ width: 60, height: 88, borderRadius: 4, background: book.cover ? "transparent" : "#EDE8DF", flexShrink: 0, overflow: "hidden", display: "flex", alignItems: "center", justifyContent: "center", border: "1px solid #D8D0C4" }}>
            {book.cover ? <img src={book.cover} alt={book.title} style={{ width: "100%", height: "100%", objectFit: "cover" }} /> : <span style={{ fontSize: 24 }}>📖</span>}
          </div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 8, flexWrap: "wrap" }}>
              <div>
                <div style={{ fontWeight: 700, fontSize: 15, color: "#1C1810", lineHeight: 1.3 }}>{book.title}</div>
                <div style={{ color: "#6B6358", fontSize: 13, marginTop: 2 }}>{book.author}{book.year ? ` · ${book.year}` : ""}</div>
              </div>
              <StatusBadge status={book.status} />
            </div>
            {book.genre && <div style={{ marginTop: 6, fontSize: 12, color: "#9B927E", fontStyle: "italic" }}>{book.genre}</div>}
            {book.status === "loaned" && book.loanedTo && (
              <div style={{ marginTop: 6, fontSize: 12, color: "#8B3A3A" }}>Loaned to <strong>{book.loanedTo}</strong></div>
            )}
            {book.notes && <div style={{ marginTop: 6, fontSize: 12, color: "#6B6358", lineHeight: 1.5 }}>{book.notes}</div>}
            <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
              <button onClick={() => onEdit(book)} style={{ background: "none", border: "1px solid #C8C0B4", borderRadius: 6, padding: "4px 12px", fontSize: 12, color: "#4A4440", cursor: "pointer", fontWeight: 500 }}>Edit</button>
              <button onClick={() => onDelete(book.id)} style={{ background: "none", border: "1px solid #E8D0D0", borderRadius: 6, padding: "4px 12px", fontSize: 12, color: "#8B3A3A", cursor: "pointer", fontWeight: 500 }}>Remove</button>
            </div>
          </div>
        </div>
      );
    }

    // --- Edit Modal ---
    function EditModal({ book, onSave, onClose }) {
      const [form, setForm] = useState({ ...book });
      const set = (k, v) => setForm(f => ({ ...f, [k]: v }));
      const inputStyle = { width: "100%", border: "1px solid #D8D0C4", borderRadius: 6, padding: "8px 10px", fontSize: 14, color: "#1C1810", background: "#FDFAF6", outline: "none" };
      return (
        <div style={{ position: "fixed", inset: 0, background: "#00000055", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100, padding: 16 }}
          onClick={e => e.target === e.currentTarget && onClose()}>
          <div style={{ background: "#FDFAF6", borderRadius: 14, width: "100%", maxWidth: 480, maxHeight: "90vh", overflowY: "auto", boxShadow: "0 8px 40px #00000030" }}>
            <div style={{ padding: "20px 24px 0", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <h2 style={{ margin: 0, fontSize: 18, color: "#1C1810", fontFamily: "Georgia, serif" }}>{form.id ? "Edit book" : "Add book"}</h2>
              <button onClick={onClose} style={{ background: "none", border: "none", fontSize: 22, cursor: "pointer", color: "#9B927E" }}>×</button>
            </div>
            <div style={{ padding: 24, display: "flex", flexDirection: "column", gap: 14 }}>
              {[
                { label: "Title", key: "title", placeholder: "Book title" },
                { label: "Author", key: "author", placeholder: "Author name" },
                { label: "Year published", key: "year", placeholder: "e.g. 2018" },
                { label: "Genre", key: "genre", placeholder: "e.g. Fiction, History…" },
              ].map(({ label, key, placeholder }) => (
                <div key={key}>
                  <label style={{ fontSize: 12, fontWeight: 600, color: "#6B6358", display: "block", marginBottom: 4, textTransform: "uppercase", letterSpacing: "0.04em" }}>{label}</label>
                  <input style={inputStyle} value={form[key]} onChange={e => set(key, e.target.value)} placeholder={placeholder} />
                </div>
              ))}
              <div>
                <label style={{ fontSize: 12, fontWeight: 600, color: "#6B6358", display: "block", marginBottom: 4, textTransform: "uppercase", letterSpacing: "0.04em" }}>Status</label>
                <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                  {Object.entries(STATUS_CONFIG).map(([key, cfg]) => (
                    <button key={key} onClick={() => set("status", key)} style={{ padding: "6px 14px", borderRadius: 6, border: `1.5px solid ${form.status === key ? cfg.color : "#D8D0C4"}`, background: form.status === key ? cfg.bg : "#fff", color: form.status === key ? cfg.color : "#6B6358", fontWeight: form.status === key ? 700 : 400, fontSize: 13, cursor: "pointer" }}>
                      {cfg.label}
                    </button>
                  ))}
                </div>
              </div>
              {form.status === "loaned" && (
                <div>
                  <label style={{ fontSize: 12, fontWeight: 600, color: "#6B6358", display: "block", marginBottom: 4, textTransform: "uppercase", letterSpacing: "0.04em" }}>Loaned to</label>
                  <input style={inputStyle} value={form.loanedTo} onChange={e => set("loanedTo", e.target.value)} placeholder="Who has it?" />
                </div>
              )}
              <div>
                <label style={{ fontSize: 12, fontWeight: 600, color: "#6B6358", display: "block", marginBottom: 4, textTransform: "uppercase", letterSpacing: "0.04em" }}>Notes</label>
                <textarea style={{ ...inputStyle, resize: "vertical", minHeight: 72 }} value={form.notes} onChange={e => set("notes", e.target.value)} placeholder="Any thoughts, ratings, or reminders…" />
              </div>
              <button onClick={() => onSave(form)} style={{ background: "#2C3E2D", color: "#fff", border: "none", borderRadius: 8, padding: "12px 0", fontSize: 15, fontWeight: 600, cursor: "pointer" }}>
                Save book
              </button>
            </div>
          </div>
        </div>
      );
    }

    // --- Main App ---
    function App() {
      const [books, setBooks] = useState(() => loadBooks());
      const [apiKey, setApiKey] = useState(() => loadApiKey());
      const [showApiModal, setShowApiModal] = useState(false);
      const [editBook, setEditBook] = useState(null);
      const [uploading, setUploading] = useState(false);
      const [filter, setFilter] = useState("all");
      const [search, setSearch] = useState("");
      const [error, setError] = useState("");
      const fileRef = useRef();

      // Persist on every change
      useEffect(() => { persistBooks(books); }, [books]);

      const handlePhotoUpload = useCallback(async (file) => {
        if (!file) return;
        if (!apiKey) { setShowApiModal(true); return; }
        setUploading(true);
        setError("");
        try {
          const base64 = await new Promise((res, rej) => {
            const r = new FileReader();
            r.onload = () => res(r.result.split(",")[1]);
            r.onerror = () => rej(new Error("Read failed"));
            r.readAsDataURL(file);
          });
          const coverDataUrl = `data:${file.type};base64,${base64}`;
          const response = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: { "Content-Type": "application/json", "x-api-key": apiKey, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
            body: JSON.stringify({
              model: "claude-sonnet-4-6",
              max_tokens: 1000,
              messages: [{ role: "user", content: [
                { type: "image", source: { type: "base64", media_type: file.type, data: base64 } },
                { type: "text", text: `Identify any books visible in this image. For each book extract title, author, year, and genre.\n\nRespond ONLY with a JSON array, no markdown:\n[{"title":"...","author":"...","year":"...","genre":"..."}]\n\nIf no books found, return [].` }
              ]}]
            }),
          });
          if (response.status === 401) { setError("Invalid API key. Click the key icon to update it."); setUploading(false); return; }
          const data = await response.json();
          const text = data.content?.map(c => c.text || "").join("") || "";
          let identified = [];
          try { identified = JSON.parse(text.replace(/```json|```/g, "").trim()); } catch {}
          if (!identified.length) { setError("No books found in the photo. Try adding manually."); setUploading(false); return; }
          const first = identified[0];
          setEditBook({ ...EMPTY_BOOK, title: first.title||"", author: first.author||"", year: first.year||"", genre: first.genre||"", cover: coverDataUrl,
            _extraBooks: identified.slice(1).map(b => ({ ...EMPTY_BOOK, ...b, cover: coverDataUrl })) });
        } catch { setError("Something went wrong. Check your API key and try again."); }
        setUploading(false);
      }, [apiKey]);

      const handleSave = useCallback((form) => {
        const extra = form._extraBooks || [];
        const { _extraBooks, ...clean } = form;
        if (clean.id) {
          setBooks(b => b.map(x => x.id === clean.id ? clean : x));
        } else {
          setBooks(b => [...b, { ...clean, id: Date.now() }, ...extra.map((bk, i) => ({ ...bk, id: Date.now()+i+1 }))]);
        }
        setEditBook(null);
      }, []);

      const handleDelete = useCallback((id) => setBooks(b => b.filter(x => x.id !== id)), []);

      const filtered = books.filter(b => {
        const matchFilter = filter === "all" || b.status === filter;
        const q = search.toLowerCase();
        return matchFilter && (!q || b.title.toLowerCase().includes(q) || b.author.toLowerCase().includes(q) || (b.genre||"").toLowerCase().includes(q));
      });

      const counts = { all: books.length, unread: 0, reading: 0, read: 0, loaned: 0 };
      books.forEach(b => { if (counts[b.status] !== undefined) counts[b.status]++; });

      return (
        <div style={{ minHeight: "100vh", background: "#F7F3EC" }}>
          {/* Header */}
          <div style={{ background: "#2C3E2D", padding: "env(safe-area-inset-top, 0) 0 0", }}>
            <div style={{ padding: "24px 24px 20px", maxWidth: 640, margin: "0 auto" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                <div>
                  <h1 style={{ margin: "0 0 4px", color: "#F0EAD6", fontFamily: "Georgia, serif", fontSize: 26, letterSpacing: "-0.01em" }}>My Library</h1>
                  <p style={{ margin: 0, color: "#8FAB8F", fontSize: 13 }}>
                    {books.length === 0 ? "No books yet — add your first one" : `${books.length} book${books.length === 1 ? "" : "s"} catalogued`}
                  </p>
                </div>
                <button onClick={() => setShowApiModal(true)} title="Set API key" style={{ background: "none", border: "1px solid #4A5E4A", borderRadius: 8, padding: "6px 10px", cursor: "pointer", fontSize: 16, color: apiKey ? "#8FAB8F" : "#E8A87C" }}>
                  {apiKey ? "🔑" : "🔑⚠️"}
                </button>
              </div>
              <div style={{ display: "flex", gap: 10, marginTop: 18, flexWrap: "wrap" }}>
                <button onClick={() => fileRef.current?.click()} disabled={uploading}
                  style={{ background: uploading ? "#4A5E4A" : "#4A7C59", color: "#fff", border: "none", borderRadius: 8, padding: "9px 18px", fontSize: 14, fontWeight: 600, cursor: uploading ? "default" : "pointer", display: "flex", alignItems: "center", gap: 7 }}>
                  {uploading
                    ? <><span style={{ display: "inline-block", width: 14, height: 14, border: "2px solid #ffffff55", borderTopColor: "#fff", borderRadius: "50%", animation: "spin 0.8s linear infinite" }} />Identifying…</>
                    : <>📷 Add from photo</>}
                </button>
                <button onClick={() => setEditBook({ ...EMPTY_BOOK })}
                  style={{ background: "transparent", color: "#C8D8C8", border: "1.5px solid #4A5E4A", borderRadius: 8, padding: "9px 18px", fontSize: 14, fontWeight: 600, cursor: "pointer" }}>
                  + Add manually
                </button>
              </div>
              <input ref={fileRef} type="file" accept="image/*" style={{ display: "none" }} onChange={e => { handlePhotoUpload(e.target.files[0]); e.target.value = ""; }} />
              {error && <div style={{ marginTop: 12, background: "#5A2A2A", color: "#F8D0D0", borderRadius: 6, padding: "8px 12px", fontSize: 13 }}>{error}</div>}
            </div>
          </div>

          {/* Filter bar */}
          <div style={{ background: "#EDE8DF", borderBottom: "1px solid #D8D0C4" }}>
            <div style={{ maxWidth: 640, margin: "0 auto", padding: "0 24px", display: "flex", overflowX: "auto" }}>
              {[["all","All"],["unread","Unread"],["reading","Reading"],["read","Read"],["loaned","Loaned"]].map(([key, label]) => (
                <button key={key} onClick={() => setFilter(key)} style={{ background: "none", border: "none", borderBottom: filter === key ? "2px solid #2C3E2D" : "2px solid transparent", color: filter === key ? "#2C3E2D" : "#7A7260", fontWeight: filter === key ? 700 : 400, fontSize: 13, padding: "12px 14px", cursor: "pointer", whiteSpace: "nowrap" }}>
                  {label}
                  {counts[key] > 0 && <span style={{ marginLeft: 5, background: filter === key ? "#2C3E2D" : "#C4BEB4", color: "#fff", borderRadius: 10, fontSize: 10, padding: "1px 6px", fontWeight: 700 }}>{counts[key]}</span>}
                </button>
              ))}
            </div>
          </div>

          {/* List */}
          <div style={{ maxWidth: 640, margin: "0 auto", padding: "20px 24px 60px" }}>
            {books.length > 0 && (
              <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search by title, author, or genre…"
                style={{ width: "100%", border: "1px solid #D8D0C4", borderRadius: 8, padding: "9px 14px", fontSize: 14, color: "#1C1810", background: "#fff", marginBottom: 16, outline: "none" }} />
            )}
            {filtered.length === 0 ? (
              <div style={{ textAlign: "center", padding: "60px 0", color: "#9B927E" }}>
                {books.length === 0
                  ? <><div style={{ fontSize: 48, marginBottom: 12 }}>📚</div><div style={{ fontSize: 16, fontWeight: 600, color: "#6B6358", marginBottom: 6 }}>Your shelves are empty</div><div style={{ fontSize: 14 }}>Upload a photo of a book or shelf to get started.</div></>
                  : <><div style={{ fontSize: 32, marginBottom: 8 }}>🔍</div><div style={{ fontSize: 14 }}>No books match your search.</div></>}
              </div>
            ) : (
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                {filtered.map(book => <BookCard key={book.id} book={book} onEdit={setEditBook} onDelete={handleDelete} />)}
              </div>
            )}
          </div>

          {editBook !== null && <EditModal book={editBook} onSave={handleSave} onClose={() => setEditBook(null)} />}
          {showApiModal && <ApiKeyModal current={apiKey} onSave={k => { setApiKey(k); setShowApiModal(false); }} onClose={() => setShowApiModal(false)} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
